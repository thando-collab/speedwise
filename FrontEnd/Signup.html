<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedWise Signup</title>
<link rel="stylesheet" href="style.css">
</head> 

<body class="dashboard-theme center">

<main class="card">
  <h2 id="signupTitle">SpeedWise Sign Up</h2>

  <form onsubmit="signup(event)" aria-labelledby="signupTitle">

    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" placeholder="Full Name" required>

    <label for="childName">Child Name (Parents Only)</label>
    <input type="text" id="childName" placeholder="Child Name">

    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="Email" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" required>

    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

    <label for="role">Select Role</label>
    <select id="role">
      <option value="driver">Driver</option>
      <option value="parent">Parent</option>
      <option value="admin">School Admin</option>
    </select>

    <label for="speedLimit">Speed Limit (Driver Only)</label>
    <input type="number" id="speedLimit" placeholder="Speed Limit">

    <label for="vehicleHealth">Vehicle Health</label>
    <select id="vehicleHealth">
      <option value="good">Good</option>
      <option value="oilNeeded">Oil Needed</option>
      <option value="engineCheck">Engine Check</option>
    </select>

    <button type="submit">Sign Up</button>
  </form>
  <output id="signupMessage" aria-live="polite"></output>

  <p>Already have an account? <a href="login.html">Login</a></p>
</main>

<script src="app.js"></script>
</body>
</html>
