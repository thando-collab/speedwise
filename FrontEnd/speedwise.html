<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpeedWise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="speedwise.css">
</head>
<body>

<!-- ================= WELCOME ================= -->
<div id="welcomePage" class="page active card">
  <h1>🚗 SpeedWise</h1>
  <p>Drive Smart • Drive Safe</p>
  <button onclick="showPage('loginPage')">Log In</button>
  <button onclick="showPage('signupPage')">Sign Up</button>
</div>

<!-- ================= LOGIN ================= -->
<div id="loginPage" class="page card">
  <h2>Login</h2>
  <input id="loginEmail" type="email" placeholder="Email">
  <input id="loginPassword" type="password" placeholder="Password">
  <button onclick="loginUser()">Login</button>
  <p><a onclick="showPage('signupPage')">Create Account</a></p>
</div>

<!-- ================= SIGNUP ================= -->
<div id="signupPage" class="page card">
  <h2>Create Account</h2>
  <input id="name" type="text" placeholder="Full Name">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <h3>Car Info</h3>
  <input id="brand" type="text" placeholder="Car Brand">
  <input id="model" type="text" placeholder="Car Model">
  <input id="number" type="text" placeholder="Vehicle Number">
  <select id="type">
    <option value="">Car Type</option>
    <option>Sedan</option>
    <option>SUV</option>
    <option>Truck</option>
    <option>Electric</option>
  </select>

  <button onclick="registerUser()">Sign Up</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboardPage" class="page container">
  <h2>Welcome, <span id="user-name"></span></h2>
  <p>Your Vehicle: <span id="vehicle-info"></span></p>

  <div class="gps-stats">
    <p>Current Road Limit: <span id="current-limit">50</span> MPH</p>
    <p>Next Road Limit: <span id="next-limit">60</span> MPH</p>
    <p id="alertText" class="alert-text"></p>
  </div>

  <div class="stats">
    <p>Current Speed: <span id="current-speed">0</span> MPH</p>
  </div>

  <div class="speedometer">
    <div class="needle" id="needle"></div>
    <div class="speed-display" id="speed-display">0 MPH</div>
  </div>

  <div class="violations">
    <h3>Recent Violations</h3>
    <ul id="violations-list"></ul>
  </div>

  <!-- Map -->
  <div id="map"></div>

  <button id="trip-btn" onclick="toggleTrip()">Start Trip</button>
  <button onclick="voiceCommand()">Voice Command</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- Google Maps API -->
<script async defer
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>

<script src="speedwise.js5"></script>
</body>
</html>
